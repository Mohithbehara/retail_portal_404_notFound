name: Frontend CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    # Currently there are no frontend tests, but you can add them here later
    # - name: Run tests
    #   run: npm test
