name: Backend CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'backend/**'
  workflow_dispatch:
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'backend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: './backend/package-lock.json'

    - name: Install dependencies
      run: npm ci

    # Currently there are no backend tests, but you can add them here later
    # - name: Run tests
    #   run: npm test

    # Simulate a build step if necessary or just check that it runs
    - name: Verify build (Linting or Compilation)
      run: echo "Backend CI passed"
